name: Release

on:
  release:
    types: ['published']

permissions:
  contents: read

jobs:
  release-pre-checks:
    name:  Test, lint and attempt to build
    runs-on: ubuntu-latest

    steps:
    - name: Check release tag
      run: |
        TAG_VERSION="${{ github.ref_name }}"
        TAG_VERSION="${TAG_VERSION#v}"
        if [ -z "$TAG_VERSION" ]; then
          echo "ERROR: TAG_VERSION is empty. Release tag was not resolved."
          exit 1
        fi

    - name: checkout code
      uses: actions/checkout@v7

    - name: Run clippy
      run: cargo clippy --verbose --all-targets --all-features  -- -D warnings

    - name: Run tests
      run: cargo test --verbose

    - name: Run fmt
      run: cargo fmt -- --check

    - name: Install dependencies
      run: cargo build

  create-release:
    name: create-release
    needs: ['release-pre-checks']
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      
      - name: Get the release version from the tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        
      - name: Show the version
        run: |
          echo "version is: ${{ github.ref_name }}"
          
      - name: Publish existing draft release or create if not exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a draft release already exists
          if gh release view ${{ github.ref_name }} &>/dev/null; then
            echo "Draft release exists, no need to create"
          else
            echo "No release found, creating one"
            gh release create ${{ github.ref_name }} --draft --verify-tag --title ${{ github.ref_name }}
          fi

    outputs:
      version: ${{ steps.version.outputs.VERSION }}


  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: x86_64-pc-windows-gnu
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v7
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 2. Add caching to make subsequent runs much faster
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      
      - name: Install aarch64 cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      
      - name: Configure linker for aarch64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
          
      - name: Update version in Cargo.toml to match release tag (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ -z "$TAG_VERSION" ]; then
            echo "ERROR: TAG_VERSION is empty. Release tag was not resolved."
            exit 1
          fi
          sed -i.bak "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" Cargo.toml

      - name: Update version in Cargo.toml to match release tag (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $TAG_VERSION = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $TAG_VERSION) {
            Write-Error "ERROR: TAG_VERSION is empty. Release tag was not resolved."
            exit 1
          }
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$TAG_VERSION`"" | Set-Content Cargo.toml
          
      - name: Debug info
        run: |
          cat Cargo.toml
          rustc --version
          cargo --version
          echo rustup target list --installed
          rustup target list --installed
          echo rustup toolchain list
          rustup toolchain list

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            smotra smotra-cli
          sha256sum ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            > ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Package (Windows)
        shell: bash
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.zip \
            smotra.exe smotra-cli.exe
          certutil -hashfile "${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.zip" SHA256 > ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256
          sha256sum ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.zip \
            > ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256

      - name: Upload artifacts (Unix)
        uses: actions/upload-artifact@v7
        if: matrix.os != 'windows-latest'
        with:
          name: release-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/${{ github.event.repository.name }}-*.tar.gz
            target/${{ matrix.target }}/release/${{ github.event.repository.name }}-*.tar.gz.sha256

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v7
        if: matrix.os == 'windows-latest'
        with:
          name: release-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/${{ github.event.repository.name }}-*.zip
            target/${{ matrix.target }}/release/${{ github.event.repository.name }}-*.zip.sha256

  deploy-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    environment:
      name: release
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Debug info
        run: |
          tree -a -L 2 . 
          ls -la artifacts

      - name: Upload release assets (without sha256 files)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # Use a standard shell glob array or separate arguments
          for file in artifacts/*.tar.gz artifacts/*.zip artifacts/*.sha256; do
            # Ensure the file actually exists before trying to upload
            [ -e "$file" ] || continue
            gh release upload "${RELEASE_TAG}" "${file}" --clobber
          done
            
  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main branch for install script
        uses: actions/checkout@v7
        with:
          path: main
        
      - name: Organize release files
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir html
          cd html
                    
          # Copy install script from main branch
          cp ../main/deployments/install-script/smotra.sh smotra.sh
          chmod +x smotra.sh
          
          # Create index.html for documentation
          cat > index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
              <title>Smotra Agent Install</title>
              <meta charset="utf-8">
              <style>
                  body { font-family: sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
                  pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
                  code { background: #f4f4f4; padding: 2px 5px; border-radius: 3px; }
              </style>
          </head>
          <body>
              <h1>Smotra Agent Installation</h1>
              <p>Latest Version: <strong>${VERSION}</strong></p>
              
              <h2>Quick Install</h2>
              <pre><code>curl -fsSL https://install.smotra.net/smotra.sh | sh</code></pre>
              
              <h2>Documentation</h2>
              <p>Visit <a href="https://github.com/${{ github.event.repository.owner.login }}/${{ github.event.repository.name }}">GitHub Repository</a> for full documentation.</p>
          </body>
          </html>
          EOF
        
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './html/' # Upload html directory (or your build folder if using a generator)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        