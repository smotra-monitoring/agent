name: Monthly Dependency Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 28 * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Rust
        run: rustup update stable && rustup default stable

      - name: Generate Update Report and Update
        id: update
        run: |
          # 1. Capture the raw report
          RAW_REPORT=$(cargo update --dry-run 2>&1 || true)
          
          # 2. Extract only the lines that actually show changes (Updating, Adding, Removing)
          # We use sed to strip the "Updating" prefix for a cleaner look
          CLEAN_REPORT=$(echo "$RAW_REPORT" | grep -E "Updating|Adding|Removing" | sed 's/Updating //g' || echo "No changes found")
          
          # 3. Store in Environment Variable
          echo "UPDATE_REPORT<<EOF" >> $GITHUB_ENV
          echo "$CLEAN_REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          cargo update

      - name: Run Unit tests
        id: test
        run: cargo test --all-features

      - name: Create Pull Request on Success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Check for changes
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to Cargo.lock. Skipping PR."
            exit 0
          fi

          # 3. Commit and Push
          git checkout -b auto-update-deps
          git add Cargo.lock
          git commit -m "chore: monthly dependency update"
          git push origin auto-update-deps --force

          # Define the PR Body with Markdown formatting
          PR_BODY="## 🤖 Monthly Dependency Update
          
          **Status:** ✅ Unit Tests Passed
          **Date:** $(date +'%Y-%m-%d')
          
          <details>
          <summary><b>📦 View Updated Packages</b> (Click to expand)</summary>
          
          \`\`\`text
          ${{ env.UPDATE_REPORT }}
          \`\`\`
          
          </details>
          
          ---
          *This PR was automatically generated by the monthly maintenance workflow.*"

          # Create PR
          gh pr create \
            --title "📦 Update Dependencies ($(date +'%b %Y'))" \
            --body "$PR_BODY" \
            --head auto-update-deps \
            --label "dependencies" || echo "PR already exists, updated via force-push."

      - name: Create Issue on Failure
        if: failure() && steps.test.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Failed: Monthly dependency update" \
            --body "The monthly dependency update failed unit tests. Updates: ${{ env.UPDATE_REPORT }}" \
            --label "bug,automated-issue,dependencies"
