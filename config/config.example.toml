version = 1
# Agent ID must be a valid UUID. Use 00000000-0000-0000-0000-000000000000 (nil UUID) for unregistered agents
# A new UUID will be generated during agent registration
agent_id = "00000000-0000-0000-0000-000000000000"
agent_name = "Test Agent 001"
tags = ["production", "monitoring"]

[monitoring]
interval_secs = 60
timeout_secs = 5
ping_count = 3
max_concurrent = 10
# Note: Traceroute types are defined but implementation is pending
traceroute_on_failure = false
traceroute_max_hops = 30

[server]
url = "https://api.smotra.net"
# api_key = "your-api-key-here"
report_interval_secs = 300
heartbeat_interval_secs = 300  # Send lightweight heartbeat every 5 minutes
verify_tls = true
timeout_secs = 30
retry_attempts = 3

# Claiming workflow configuration (for agent self-registration)
[server.claiming]
max_registration_retries = 5  # Maximum retry attempts for registration

[storage]
cache_dir = "./cache"
max_cached_results = 10000
max_cache_age_secs = 86400

[update]
enabled = false
check_url = "https://github.com/smotra-monitoring/agent"
check_interval_secs = 3600

# --- Result cache settings ---
# Set to false to disable in-memory caching and batch result reporting entirely.
cache_enabled = true
# How many results to include in a single POST /agent/{id}/results request.
cache_batch_size = 100
# How often the result reporter drains the cache and sends a batch (seconds).
cache_report_interval_secs = 60

# Example endpoints to monitor
# Note: 'id' is required. It uniquely identifies the endpoint so MonitoringResults can
# be correlated on the server. Endpoints provisioned via the API will have their id
# returned by the server; endpoints configured manually must be assigned a UUIDv7 here.
[[endpoints]]
id = "019680be-0000-7000-8000-000000000001"
address = "8.8.8.8"
tags = ["dns", "google"]
enabled = true  # Optional, defaults to true

[[endpoints]]
id = "019680be-0000-7000-8000-000000000002"
address = "1.1.1.1"
tags = ["dns", "cloudflare"]
enabled = true

[[endpoints]]
id = "019680be-0000-7000-8000-000000000003"
address = "example.com"
tags = ["web"]
# enabled = false  # Uncomment to disable this endpoint
